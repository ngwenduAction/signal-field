<!-- index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signal Field</title>
    <style>
      /*
      Reset everything. The canvas IS the page.
      No scrollbars, no margins, no surprises.
    */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        overflow: hidden;
        background: #000;
        color: #fff;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }

      canvas {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="signal-canvas"></canvas>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
